name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[asymmetric]"
          python -m pip install pytest fastapi httpx

      - name: Compile package
        run: python -m compileall actenon examples

      - name: Run demo
        run: make demo

      - name: Run FastAPI demos
        run: make fastapi-demo

      - name: Run tests
        run: make test
