name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.9"
          - "3.11"
          - "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install package
        run: python -m pip install -e ".[asymmetric]"

      - name: Install test dependencies
        run: python -m pip install pytest fastapi httpx

      - name: Compile package
        run: python -m compileall actenon

      - name: Run quickstart demo
        run: python examples/quickstart_min.py

      - name: Run interactive execution demo
        run: python examples/interactive_execution_demo.py

      - name: Run tests
        run: make test
