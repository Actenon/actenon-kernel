
name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "actenon-protocol @ git+https://github.com/Actenon/actenon-protocol.git@v1.0.0"
          python -m pip install -e ".[asymmetric]"
          python -m pip install pytest fastapi httpx

      - name: Compile package and examples
        run: |
          python -m compileall actenon examples

      - name: Run demo
        run: make demo

      - name: Run tests
        run: make test
