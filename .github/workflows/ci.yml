name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install package
        run: python -m pip install -e ".[asymmetric]"

      - name: Install test runner
        run: python -m pip install pytest

      - name: Compile core package
        run: python -m compileall actenon

      - name: Run quickstart smoke test
        run: python examples/quickstart_min.py

      - name: Run interactive execution demo
        run: python examples/interactive_execution_demo.py

      - name: Run core evidence tests
        run: |
          python -m pytest \
            examples/protected_policy_preflight_refund \
            tests/test_interactive_execution_demo.py \
            tests/test_dx_adoption_fixes.py \
            examples/financial_agent_protected_transfer \
            examples/fastmcp_financial_transfer \
            examples/protected_clinical_ehr_agent \
            examples/protected_multi_agent_swarm \
            examples/protected_iam_control_plane \
            -q
